<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Health Monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 600;
    margin-bottom: 2rem;
    color: #58a6ff;
    letter-spacing: 0.02em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 960px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 1.5rem;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #58a6ff; }
  .card h2 {
    font-size: 1rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #8b949e;
    margin-bottom: 1rem;
  }
  .stats { margin-bottom: 1rem; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 0.3rem 0;
    font-size: 0.9rem;
  }
  .stat-row .label { color: #8b949e; }
  .stat-row .value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .bar-track {
    width: 100%;
    height: 10px;
    background: #21262d;
    border-radius: 999px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .bar-fill.cpu { background: linear-gradient(90deg, #58a6ff, #1f6feb); }
  .bar-fill.ram { background: linear-gradient(90deg, #3fb950, #238636); }
  .bar-fill.disk { background: linear-gradient(90deg, #d29922, #9e6a03); }
  .bar-fill.danger { background: linear-gradient(90deg, #f85149, #da3633); }
  .timestamp {
    margin-top: 2rem;
    font-size: 0.8rem;
    color: #484f58;
  }
  .error {
    color: #f85149;
    margin-top: 1rem;
    font-size: 0.85rem;
  }
</style>
</head>
<body>
<h1>System Health Monitor</h1>
<div class="grid" id="dashboard">
  <div class="card" id="card-cpu">
    <h2>CPU</h2>
    <div class="stats">
      <div class="stat-row"><span class="label">Usage</span><span class="value" id="cpu-usage">0.0%</span></div>
    </div>
    <div class="bar-track"><div class="bar-fill cpu" id="cpu-bar" style="width:0%"></div></div>
  </div>
  <div class="card" id="card-ram">
    <h2>RAM</h2>
    <div class="stats">
      <div class="stat-row"><span class="label">Used</span><span class="value" id="ram-used">0 GB / 0 GB</span></div>
      <div class="stat-row"><span class="label">Usage</span><span class="value" id="ram-percent">0.0%</span></div>
    </div>
    <div class="bar-track"><div class="bar-fill ram" id="ram-bar" style="width:0%"></div></div>
  </div>
  <div class="card" id="card-disk">
    <h2>Disk</h2>
    <div class="stats">
      <div class="stat-row"><span class="label">Used</span><span class="value" id="disk-used">0 GB / 0 GB</span></div>
      <div class="stat-row"><span class="label">Usage</span><span class="value" id="disk-percent">0.0%</span></div>
    </div>
    <div class="bar-track"><div class="bar-fill disk" id="disk-bar" style="width:0%"></div></div>
  </div>
</div>
<div class="timestamp" id="timestamp">Waiting for data…</div>
<div class="error" id="error"></div>

<script>
const GB = 1024 ** 3;

function formatGB(bytes) { return (bytes / GB).toFixed(1); }

function setBar(barId, pct) {
  const bar = document.getElementById(barId);
  bar.style.width = pct + '%';
  bar.classList.toggle('danger', pct > 90);
}

function updateUI(data) {
  document.getElementById('cpu-usage').textContent = data.cpu_percent.toFixed(1) + '%';
  setBar('cpu-bar', data.cpu_percent);

  const ram = data.memory;
  document.getElementById('ram-used').textContent = `${formatGB(ram.used)} GB / ${formatGB(ram.total)} GB`;
  document.getElementById('ram-percent').textContent = ram.percent.toFixed(1) + '%';
  setBar('ram-bar', ram.percent);

  const disk = data.disk;
  document.getElementById('disk-used').textContent = `${formatGB(disk.used)} GB / ${formatGB(disk.total)} GB`;
  document.getElementById('disk-percent').textContent = disk.percent.toFixed(1) + '%';
  setBar('disk-bar', disk.percent);

  document.getElementById('timestamp').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  document.getElementById('error').textContent = '';
}

function showError(msg) {
  document.getElementById('error').textContent = msg;
}

async function fetchHealth() {
  try {
    const res = await fetch('/api/health');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    updateUI(data);
  } catch (err) {
    showError('Failed to fetch health data: ' + err.message);
  }
}

fetchHealth();
setInterval(fetchHealth, 2000);
</script>
</body>
</html>
